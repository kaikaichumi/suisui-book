name: CI/CD → RackNerd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/suisui-book-frontend
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/suisui-book-backend

jobs:
  # ── 建 image 並推到 GHCR ────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ── SSH 到 VM，拉新 image 重啟 ──────────────────────────────
  deploy:
    name: Deploy to VM
    needs: build
    # PR 只 build 不 deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd ~/suisui-book

            # 登入 GHCR（credentials 會快取在 ~/.docker/config.json）
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 更新 code（Caddyfile / env.example 等設定檔）
            git pull --ff-only

            # 拉最新 image，不重 build
            docker compose -f docker-compose.racknerd.yml pull

            # 滾動重啟（先 backend 再 frontend）
            docker compose -f docker-compose.racknerd.yml up -d --no-build

            # Health check
            sleep 15
            curl -sf http://localhost/api/health \
              && echo "✓ Deploy successful: $(date)" \
              || { echo "✗ Health check failed"; exit 1; }
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER:  ${{ github.repository_owner }}
