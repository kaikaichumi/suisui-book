# 共享反向代理 — 在 VM 上放到 /opt/caddy-gateway/
# 啟動: docker compose up -d
# 所有網站的 docker compose 都要 join 外部網路 "web"

services:
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    name: web
    driver: bridge
