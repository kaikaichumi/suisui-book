version: '3.8'

services:
  # Cloudflare Tunnel - е®‰е…Ёе°Ќе¤–йЂЈз·љ
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend

  # Frontend - Nginx йќњж…‹з¶Із«™ + API д»Јзђ†
  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  # Backend - Node.js API жњЌе‹™
  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-300}
      # Sentry
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      # LINE Login
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID:-}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET:-}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL:-}
      # Email
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    restart: unless-stopped
