services:
  frontend:
    image: ghcr.io/${GITHUB_REPO_OWNER}/suisui-book-frontend:latest
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - web
      - internal

  backend:
    image: ghcr.io/${GITHUB_REPO_OWNER}/suisui-book-backend:latest
    expose:
      - "5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-300}
      - SENTRY_DSN_BACKEND=${SENTRY_DSN_BACKEND:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID:-}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET:-}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    restart: unless-stopped
    networks:
      - internal

networks:
  web:
    external: true
    name: web
  internal:
    driver: bridge
